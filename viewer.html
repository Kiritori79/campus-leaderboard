<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Leaderboard</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <style>
    :root {
      --purple-900: #4c1d95;
      --purple-700: #6d28d9;
      --purple-600: #7c3aed;
      --purple-500: #8b5cf6;
      --purple-400: #a78bfa;
      --purple-300: #c4b5fd;
      --purple-200: #ddd6fe;
      --purple-100: #ede9fe;
      --purple-50: #f5f3ff;
      --white: #ffffff;
      --text: #1e1b4b;
      --text-muted: #6b7280;
      --shadow: 0 4px 24px rgba(109, 40, 217, 0.10);
      --shadow-lg: 0 12px 40px rgba(109, 40, 217, 0.14);
      --row-h: 39px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, var(--purple-50) 0%, #faf5ff 40%, var(--white) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(139, 92, 246, 0.18), transparent),
        radial-gradient(ellipse 60% 40% at 90% 10%, rgba(167, 139, 250, 0.15), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .hero {
      background: var(--white);
      border: 1px solid var(--purple-200);
      border-radius: 20px;
      padding: 24px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .hero-left { flex: 1; min-width: 200px; }

    h1 {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--purple-900), var(--purple-600));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .activity-title {
      margin-top: 6px;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--purple-700);
    }

    .date-badge {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--purple-700);
      background: linear-gradient(135deg, var(--purple-100), var(--white));
      border: 1px solid var(--purple-200);
      padding: 12px 20px;
      border-radius: 14px;
      min-width: 200px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(124, 58, 237, 0.08);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
      background: var(--white);
      border: 1px solid var(--purple-200);
      border-radius: 16px;
      padding: 14px 18px;
      box-shadow: var(--shadow);
    }

    .seg {
      display: flex;
      background: var(--purple-50);
      border: 1px solid var(--purple-200);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }

    .seg button {
      border: none;
      background: transparent;
      color: var(--text-muted);
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: none;
    }

    .seg button:hover { transform: none; background: var(--purple-100); }
    .seg button.active {
      background: var(--white);
      color: var(--purple-700);
      box-shadow: 0 1px 4px rgba(109, 40, 217, 0.12);
    }

    button {
      background: var(--white);
      color: var(--purple-700);
      border: 1px solid var(--purple-200);
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--purple-50);
      border-color: var(--purple-400);
    }

    button.primary {
      background: linear-gradient(135deg, var(--purple-600), var(--purple-500));
      color: var(--white);
      border: none;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.35);
    }

    button.primary:hover {
      background: linear-gradient(135deg, var(--purple-700), var(--purple-600));
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    select {
      background: var(--purple-50);
      color: var(--purple-900);
      border: 1px solid var(--purple-200);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }

    .toolbar label.hidden { display: none; }

    .bot-picker { position: relative; }

    .bot-picker-btn {
      min-width: 140px;
      text-align: left;
      padding-right: 28px;
      position: relative;
    }

    .bot-picker-btn::after {
      content: "▾";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 11px;
    }

    .bot-picker-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 30;
      width: min(360px, 88vw);
      max-height: 360px;
      background: var(--white);
      border: 1px solid var(--purple-200);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
    }

    .bot-picker-menu.hidden { display: none; }

    .bot-picker-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid var(--purple-100);
      flex-shrink: 0;
    }

    .bot-picker-actions button {
      padding: 5px 10px;
      font-size: 12px;
    }

    .bot-picker-list {
      overflow-y: auto;
      padding: 8px;
      flex: 1;
    }

    .bot-picker-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
    }

    .bot-picker-item:hover { background: var(--purple-50); }

    .bot-picker-item input { cursor: pointer; flex-shrink: 0; }

    .bot-picker-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .panel {
      background: var(--white);
      border: 1px solid var(--purple-200);
      border-radius: 20px;
      padding: 20px 22px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .panel.hidden { display: none; }

    /* ── Racing bar chart ── */
    .race-track {
      position: relative;
      width: 100%;
    }

    .race-row {
      position: absolute;
      left: 0;
      right: 0;
      height: 34px;
      display: grid;
      grid-template-columns: 32px minmax(140px, 1.4fr) 1fr 88px;
      align-items: center;
      gap: 10px;
      padding: 0 2px;
      border-radius: 10px;
      will-change: transform;
    }

    .race-row:hover { background: var(--purple-50); }

    .race-row.rank-changed {
      animation: rankFlash 0.65s ease-out;
    }

    @keyframes rankFlash {
      0%   { background: rgba(139, 92, 246, 0.22); }
      100% { background: transparent; }
    }

    .rank {
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      color: var(--text-muted);
      width: 26px;
      height: 26px;
      line-height: 26px;
      border-radius: 8px;
      margin: 0 auto;
      transition: background 0.3s, color 0.3s;
    }

    .rank.top1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #fff; }
    .rank.top2 { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #fff; }
    .rank.top3 { background: linear-gradient(135deg, #fcd34d, #d97706); color: #fff; }

    .race-label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 4px;
    }

    .bar-wrap {
      height: 22px;
      background: var(--purple-50);
      border: 1px solid var(--purple-100);
      border-radius: 6px;
      overflow: visible;
      position: relative;
    }

    .bar {
      height: 100%;
      border-radius: 5px;
      min-width: 2px;
      position: relative;
      will-change: width;
    }

    .bar.growing::after {
      content: "";
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 16px;
      border-radius: 50%;
      background: inherit;
      filter: blur(4px);
      opacity: 0.7;
      animation: barGlow 0.8s ease-out;
    }

    @keyframes barGlow {
      0%   { opacity: 0.9; transform: translateY(-50%) scale(1.4); }
      100% { opacity: 0;   transform: translateY(-50%) scale(1); }
    }

    .race-value {
      text-align: right;
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--purple-700);
    }

    .lines-wrap {
      position: relative;
      height: min(520px, 62vh);
      min-height: 320px;
    }

    .lines-wrap svg { display: block; width: 100%; height: calc(100% - 36px); }

    .lines-wrap .line-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      justify-content: center;
      padding-top: 8px;
      max-height: 36px;
      overflow: hidden;
    }

    .lines-wrap .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      color: #4c1d95;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.15s;
    }

    .lines-wrap .legend-item.off { opacity: 0.35; text-decoration: line-through; }

    .lines-wrap .legend-swatch {
      width: 12px;
      height: 3px;
      border-radius: 2px;
    }

    .lines-wrap .line-path { transition: none; }

    .lines-wrap .line-tip {
      filter: drop-shadow(0 0 3px currentColor);
      pointer-events: none;
    }

    .lines-wrap .axis text { fill: #6b7280; font-size: 11px; }
    .lines-wrap .axis line, .lines-wrap .axis path { stroke: #ede9fe; }
    .lines-wrap .axis-label { fill: #6d28d9; font-size: 11px; font-weight: 600; }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 72px 24px;
      font-size: 15px;
    }

    .foot {
      margin-top: 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    @media (max-width: 720px) {
      .race-row {
        grid-template-columns: 28px 1fr 72px;
        grid-template-rows: auto auto;
        height: auto;
        padding: 6px 2px;
        gap: 4px 8px;
      }
      .race-label { grid-column: 2 / 4; }
      .bar-wrap { grid-column: 2 / 3; }
      .race-value { grid-column: 3 / 4; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="hero-left">
        <h1>Creator Leaderboard</h1>
        <div class="activity-title" id="activityTitle"></div>
      </div>
      <div class="date-badge" id="dateLabel">—</div>
    </div>

    <div class="toolbar">
      <div class="seg">
        <button id="barsBtn" class="active" type="button">Bars</button>
        <button id="linesBtn" type="button">Lines</button>
      </div>
      <button class="primary" id="playBtn" type="button">▶ Play</button>
      <button id="restartBtn" type="button">↺ Replay</button>
      <label id="viewModeLabel">View
        <select id="viewModeSelect">
          <option value="bot" selected>Bot</option>
          <option value="author">Author</option>
        </select>
      </label>
      <label id="topLabel">Top
        <select id="topSelect">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
          <option value="9999">All</option>
        </select>
      </label>
      <label id="linesBotsLabel" class="hidden">Bots
        <div class="bot-picker" id="botPicker">
          <button class="bot-picker-btn" id="botPickerBtn" type="button">Top 20</button>
          <div class="bot-picker-menu hidden" id="botPickerMenu">
            <div class="bot-picker-actions">
              <button type="button" data-preset="10">Top 10</button>
              <button type="button" data-preset="20">Top 20</button>
              <button type="button" data-preset="50">Top 50</button>
              <button type="button" data-preset="all">All</button>
            </div>
            <div class="bot-picker-list" id="botPickerList"></div>
          </div>
        </div>
      </label>
      <label>Speed
        <select id="speedSelect">
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
        </select>
      </label>
    </div>

    <div class="panel" id="barsPanel">
      <div id="barsChart"></div>
    </div>
    <div class="panel hidden" id="linesPanel">
      <div class="lines-wrap" id="linesChart"></div>
    </div>
    <div class="foot" id="foot"></div>
  </div>

  <script>
    const board = /*__BOARD_DATA__*/;

    // ── Unified animation constants (single source of truth) ──
    const ROW_H = 39;
    const ease = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    const lerp = (a, b, t) => a + (b - a) * t;

    // ── DOM refs ──
    const barsChartEl = document.getElementById('barsChart');
    const linesChartEl = document.getElementById('linesChart');
    const linesPanel = document.getElementById('linesPanel');
    const barsPanel = document.getElementById('barsPanel');
    const dateLabel = document.getElementById('dateLabel');
    const activityTitle = document.getElementById('activityTitle');
    const foot = document.getElementById('foot');
    const playBtn = document.getElementById('playBtn');
    const restartBtn = document.getElementById('restartBtn');
    const topSelect = document.getElementById('topSelect');
    const topLabel = document.getElementById('topLabel');
    const viewModeLabel = document.getElementById('viewModeLabel');
    const viewModeSelect = document.getElementById('viewModeSelect');
    const linesBotsLabel = document.getElementById('linesBotsLabel');
    const botPickerBtn = document.getElementById('botPickerBtn');
    const botPickerMenu = document.getElementById('botPickerMenu');
    const botPickerList = document.getElementById('botPickerList');
    const speedSelect = document.getElementById('speedSelect');
    const barsBtn = document.getElementById('barsBtn');
    const linesBtn = document.getElementById('linesBtn');

    function segmentMs() {
      const speed = Number(speedSelect.value);
      return Math.min(5000, Math.max(600, Math.round(1200 / speed)));
    }

    const BAR_COLORS = [
      '#ddd6fe', '#e9d5ff', '#c4b5fd', '#ede9fe',
      '#d8b4fe', '#f3e8ff', '#e0e7ff', '#f5d0fe',
    ];
    const LINE_COLORS = [
      '#7c3aed', '#8b5cf6', '#a78bfa', '#6d28d9',
      '#9333ea', '#c084fc', '#5b21b6', '#a855f7',
    ];

    let view = new URLSearchParams(location.search).get('v') === 'lines' ? 'lines' : 'bars';
    let barViewMode = 'bot';
    let barRace = null;
    let lineRace = null;
    let lineColorMap = new Map();
    let lineHiddenCids = new Set();
    let prevBarValues = new Map();

    foot.textContent = `${board.racers?.length || 0} bots · Updated ${board.updatedAt || ''}`;
    if (board.name) activityTitle.textContent = board.name;
    else activityTitle.style.display = 'none';

    function lineColorFor(cid) {
      if (!lineColorMap.has(cid)) {
        const i = lineColorMap.size;
        lineColorMap.set(cid, i < LINE_COLORS.length
          ? LINE_COLORS[i]
          : `hsl(${(i * 137.508) % 360}, 65%, 52%)`);
      }
      return lineColorMap.get(cid);
    }

    function barColor(i) { return BAR_COLORS[i % BAR_COLORS.length]; }

    function rankClass(i) {
      if (i === 0) return 'rank top1';
      if (i === 1) return 'rank top2';
      if (i === 2) return 'rank top3';
      return 'rank';
    }

    function fmt(n) { return Number(Math.round(n)).toLocaleString('en-US'); }

    function fmtDate(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function sortedRacers() {
      const idx = board.days.length - 1;
      return [...board.racers]
        .map(r => ({ ...r, value: r.series[idx] ?? 0 }))
        .sort((a, b) => b.value - a.value || a.label.localeCompare(b.label));
    }

    let selectedCids = new Set(sortedRacers().slice(0, 20).map(r => r.cid));

    // ── Interpolation model: value(t) = lerp(dayA, dayB, progress) ──
    function racerValueAt(r, t) {
      if (!board.days?.length || t < r.firstDay) return 0;
      const n = board.days.length - 1;
      const clamped = Math.max(0, Math.min(t, n));
      const i0 = Math.floor(clamped);
      const i1 = Math.min(i0 + 1, n);
      const frac = clamped - i0;
      const v0 = r.series[i0] ?? 0;
      const v1 = r.series[i1] ?? v0;
      return lerp(v0, v1, frac);
    }

    function racersAtDay(dayIdx, mode) {
      const i = Math.max(0, Math.min(Math.round(dayIdx), board.days.length - 1));
      let racers = board.racers
        .filter(r => r.firstDay <= i)
        .map(r => ({ ...r, value: r.series[i] ?? 0 }));

      if (mode === 'author') {
        const best = new Map();
        for (const r of racers) {
          const key = (r.creator || '').trim() || r.label;
          const prev = best.get(key);
          if (!prev || r.value > prev.value || (r.value === prev.value && r.label < prev.label)) {
            best.set(key, r);
          }
        }
        racers = [...best.values()].map(r => ({
          ...r,
          label: (r.creator || '').trim() || r.name || r.label,
        }));
      }
      return racers.sort((a, b) => b.value - a.value || a.label.localeCompare(b.label));
    }

    function racersAtTime(t, mode) {
      let racers = board.racers
        .filter(r => t >= r.firstDay)
        .map(r => ({ ...r, value: racerValueAt(r, t) }));

      if (mode === 'author') {
        const best = new Map();
        for (const r of racers) {
          const key = (r.creator || '').trim() || r.label;
          const prev = best.get(key);
          if (!prev || r.value > prev.value || (r.value === prev.value && r.label < prev.label)) {
            best.set(key, r);
          }
        }
        racers = [...best.values()].map(r => ({
          ...r,
          label: (r.creator || '').trim() || r.name || r.label,
        }));
      }
      return racers.sort((a, b) => b.value - a.value || a.label.localeCompare(b.label));
    }

    function barFrameAt(t, mode, top) {
      const i0 = Math.max(0, Math.floor(t));
      const i1 = Math.min(Math.ceil(t), board.days.length - 1);
      const frac = t - Math.floor(t);

      const sorted = racersAtTime(t, mode).slice(0, top);
      const ranks0 = new Map(racersAtDay(i0, mode).slice(0, top + 8).map((r, i) => [r.cid, i]));
      const ranks1 = new Map(racersAtDay(i1, mode).slice(0, top + 8).map((r, i) => [r.cid, i]));

      return sorted.map((r, rank) => {
        const r0 = ranks0.has(r.cid) ? ranks0.get(r.cid) : rank;
        const r1 = ranks1.has(r.cid) ? ranks1.get(r.cid) : rank;
        const yRank = lerp(r0, r1, frac);
        return { ...r, rank, y: yRank * ROW_H };
      });
    }

    function linePointsAt(r, t) {
      if (t < r.firstDay) return [];
      const n = board.days.length;
      const clampedT = Math.min(Math.max(t, r.firstDay), n - 1);
      const pts = [];
      const fi = Math.floor(clampedT);

      for (let i = r.firstDay; i < fi; i++) {
        pts.push({ x: i, y: r.series[i] ?? 0 });
      }

      const tipY = racerValueAt(r, clampedT);
      if (Math.abs(clampedT - fi) < 1e-6) {
        pts.push({ x: fi, y: tipY });
      } else {
        if (fi >= r.firstDay && fi < n) {
          pts.push({ x: fi, y: r.series[fi] ?? 0 });
        }
        pts.push({ x: clampedT, y: tipY });
      }
      return pts;
    }

    function lineMaxAt(racers, t) {
      let max = 1;
      for (const r of racers) {
        const v = racerValueAt(r, t);
        if (v > max) max = v;
        for (const p of linePointsAt(r, t)) {
          if (p.y > max) max = p.y;
        }
      }
      return max;
    }

    // ── Unified timeline engine ──
    const timeline = {
      t: -1,
      playing: false,
      raf: null,
      segFrom: 0,
      segWall: 0,

      effectiveT() {
        return this.t < 0 ? 0 : this.t;
      },

      setT(t, render = true) {
        this.t = t;
        if (render) renderFrame(this.effectiveT());
      },

      durationMs: segmentMs,

      tick(now) {
        if (!this.playing) return;

        if (this.t < 0) {
          this.segFrom = 0;
          this.segWall = now;
          this.t = 0;
          renderFrame(0);
        }

        const dur = this.durationMs();
        const elapsed = now - this.segWall;
        const raw = Math.min(1, elapsed / dur);
        this.t = this.segFrom + ease(raw);
        renderFrame(this.t);

        if (raw >= 1) {
          this.t = this.segFrom + 1;
          renderFrame(this.t);
          if (this.segFrom + 1 >= board.days.length - 1) {
            this.t = board.days.length - 1;
            this.playing = false;
            playBtn.textContent = '↺ Replay';
            return;
          }
          this.segFrom += 1;
          this.segWall = now;
        }
        this.raf = requestAnimationFrame(ts => this.tick(ts));
      },

      start() {
        if (this.playing) return;
        if (this.t >= board.days.length - 1) this.t = -1;
        this.playing = true;
        playBtn.textContent = '⏸ Pause';
        this.segFrom = this.t < 0 ? 0 : Math.floor(this.t);
        const frac = this.t < 0 ? 0 : this.t - this.segFrom;
        this.segWall = performance.now() - frac * this.durationMs();
        this.raf = requestAnimationFrame(ts => this.tick(ts));
      },

      stop() {
        this.playing = false;
        if (this.raf) cancelAnimationFrame(this.raf);
        this.raf = null;
        playBtn.textContent = '▶ Play';
      },

      restart() {
        this.stop();
        this.t = -1;
        if (lineRace) lineRace.reset();
        renderFrame(0, { ready: true });
      },
    };

    // ── Bar chart renderer (direct frame set, no CSS/inner tween) ──
    class BarRaceChart {
      constructor(container) {
        this.container = container;
        this.track = document.createElement('div');
        this.track.className = 'race-track';
        container.innerHTML = '';
        container.appendChild(this.track);
        this.rows = new Map();
        this.prevRanks = new Map();
      }

      createRow(cid) {
        const el = document.createElement('div');
        el.className = 'race-row';
        el.dataset.cid = cid;
        el.innerHTML = `
          <div class="rank"></div>
          <div class="race-label"></div>
          <div class="bar-wrap"><div class="bar"></div></div>
          <div class="race-value"></div>`;
        return {
          el,
          rank: el.querySelector('.rank'),
          label: el.querySelector('.race-label'),
          bar: el.querySelector('.bar'),
          value: el.querySelector('.race-value'),
        };
      }

      render(items, maxVal) {
        const cids = new Set(items.map(r => r.cid));

        for (const [cid, row] of this.rows) {
          if (!cids.has(cid)) {
            row.el.remove();
            this.rows.delete(cid);
            this.prevRanks.delete(cid);
            prevBarValues.delete(cid);
          }
        }

        items.forEach((r, rank) => {
          let row = this.rows.get(r.cid);
          if (!row) {
            row = this.createRow(r.cid);
            this.rows.set(r.cid, row);
            this.track.appendChild(row.el);
            row.el.style.opacity = '0';
          }

          const pct = Math.max(0.2, (r.value / maxVal) * 100);
          const prevVal = prevBarValues.get(r.cid) ?? r.value;
          const prevRank = this.prevRanks.get(r.cid);
          const rankChanged = prevRank != null && prevRank !== rank;

          row.el.style.transition = 'none';
          row.el.style.transform = `translateY(${r.y}px)`;
          row.el.style.opacity = '1';
          row.bar.style.transition = 'none';
          row.bar.style.width = `${pct}%`;
          row.bar.style.background = barColor(rank);
          row.label.textContent = r.label;
          row.label.title = r.label;
          row.rank.textContent = rank + 1;
          row.rank.className = rankClass(rank);
          row.value.textContent = fmt(r.value);

          if (r.value > prevVal + 0.5) {
            row.bar.classList.remove('growing');
            row.bar.offsetHeight;
            row.bar.classList.add('growing');
          }

          if (rankChanged) {
            row.el.classList.remove('rank-changed');
            row.el.offsetHeight;
            row.el.classList.add('rank-changed');
          }

          this.prevRanks.set(r.cid, rank);
          prevBarValues.set(r.cid, r.value);
        });

        this.track.style.height = `${Math.max(1, items.length) * ROW_H}px`;
      }
    }

    // ── D3 line chart — fractional tip + clip reveal (same timeline as bars) ──
    class LineRaceChart {
      constructor(container) {
        this.el = container;
        this.uid = 'lc' + Math.random().toString(36).slice(2, 8);
        this.margin = { top: 14, right: 18, bottom: 36, left: 52 };
        this.svg = d3.select(container).append('svg');
        this.g = this.svg.append('g');
        this.defs = this.svg.append('defs');
        this.clipPath = this.defs.append('clipPath').attr('id', this.uid);
        this.clipRect = this.clipPath.append('rect');
        this.pathsG = this.g.append('g').attr('clip-path', `url(#${this.uid})`);
        this.tipsG = this.g.append('g');
        this.xAxisG = this.g.append('g').attr('class', 'axis x-axis');
        this.yAxisG = this.g.append('g').attr('class', 'axis y-axis');
        this.yLabel = this.g.append('text').attr('class', 'axis-label').text('Total chats');
        this.legendEl = d3.select(container).append('div').attr('class', 'line-legend');
        this.xScale = d3.scaleLinear();
        this.yScale = d3.scaleLinear();
        this.lineGen = d3.line()
          .x(d => this.xScale(d.x))
          .y(d => this.yScale(d.y))
          .curve(d3.curveMonotoneX);
        this._yMax = 1;
        this._lastT = null;
        this._lastRacers = null;
        this._ro = new ResizeObserver(() => {
          if (this._lastT != null) this.render(this._lastRacers, this._lastT);
        });
        this._ro.observe(container);
      }

      _layout() {
        const rect = this.el.getBoundingClientRect();
        this.w = Math.max(200, rect.width - this.margin.left - this.margin.right);
        this.h = Math.max(160, rect.height - this.margin.top - this.margin.bottom - 36);
        this.svg.attr('width', rect.width).attr('height', rect.height);
        this.g.attr('transform', `translate(${this.margin.left},${this.margin.top})`);
        this.xScale.range([0, this.w]);
        this.yScale.range([this.h, 0]);
        this.xAxisG.attr('transform', `translate(0,${this.h})`);
        this.yLabel.attr('x', -this.h / 2).attr('y', -40)
          .attr('transform', 'rotate(-90)').attr('text-anchor', 'middle');
      }

      render(racers, t) {
        if (!racers.length) return;
        this._lastRacers = racers;
        this._lastT = t;
        this._layout();

        const n = board.days.length;
        const clampedT = Math.min(Math.max(t, 0), n - 1);
        this.xScale.domain([0, Math.max(1, n - 1)]);

        const targetMax = lineMaxAt(racers, t);
        if (timeline.playing) {
          this._yMax += (targetMax - this._yMax) * 0.18;
        } else {
          this._yMax = targetMax;
        }
        this.yScale.domain([0, Math.ceil(this._yMax * 1.08)]);

        const xTicks = board.days.map((_, i) => i)
          .filter(i => i % Math.max(1, Math.ceil(n / 8)) === 0 || i === n - 1);
        this.xAxisG.call(d3.axisBottom(this.xScale).tickValues(xTicks).tickFormat(i => fmtDate(board.days[i])));
        this.yAxisG.call(d3.axisLeft(this.yScale).ticks(6).tickFormat(d => fmt(d)));

        this.clipRect
          .attr('x', 0)
          .attr('y', -8)
          .attr('height', this.h + 16)
          .attr('width', this.xScale(clampedT) + 2);

        const series = racers.map(r => ({
          cid: r.cid,
          label: r.label,
          color: lineColorFor(r.cid),
          hidden: lineHiddenCids.has(r.cid),
          pts: linePointsAt(r, t),
        }));

        const sel = this.pathsG.selectAll('path.line-path').data(series, d => d.cid);
        sel.enter()
          .append('path')
          .attr('class', 'line-path')
          .attr('fill', 'none')
          .attr('stroke-width', 2.5)
          .merge(sel)
          .attr('d', d => d.pts.length >= 2 ? this.lineGen(d.pts) : (d.pts.length === 1 ? `M${this.xScale(d.pts[0].x)},${this.yScale(d.pts[0].y)}` : null))
          .attr('stroke', d => d.color)
          .attr('opacity', d => d.hidden ? 0 : 1);
        sel.exit().remove();

        const tips = series
          .filter(d => !d.hidden && d.pts.length)
          .map(d => ({ cid: d.cid, color: d.color, ...d.pts[d.pts.length - 1] }));

        this.tipsG.selectAll('circle.line-tip').data(tips, d => d.cid)
          .join(
            enter => enter.append('circle').attr('class', 'line-tip').attr('r', 4),
            update => update,
            exit => exit.remove(),
          )
          .attr('cx', d => this.xScale(d.x))
          .attr('cy', d => this.yScale(d.y))
          .attr('fill', d => d.color)
          .attr('stroke', '#fff')
          .attr('stroke-width', 1.5);

        const leg = this.legendEl.selectAll('.legend-item').data(series, d => d.cid);
        leg.enter()
          .append('div')
          .attr('class', 'legend-item')
          .html(d => `<span class="legend-swatch" style="background:${d.color}"></span>${d.label}`);
        leg.classed('off', d => d.hidden);
        leg.exit().remove();
        this.legendEl.selectAll('.legend-item').on('click', (_e, d) => {
          if (lineHiddenCids.has(d.cid)) lineHiddenCids.delete(d.cid);
          else lineHiddenCids.add(d.cid);
          this.render(racers, t);
        });
      }

      reset() {
        this._yMax = 1;
        this._lastT = null;
      }
    }

    function getLineRacers() {
      return board.racers.filter(r => selectedCids.has(r.cid));
    }

    // ── Single render entry: timeline t drives everything ──
    function renderFrame(t, { ready = false } = {}) {
      if (!board.days?.length) return;

      const dayIdx = Math.max(0, Math.min(Math.floor(t), board.days.length - 1));
      dateLabel.textContent = timeline.t < 0 && ready
        ? 'Ready'
        : `${fmtDate(board.days[dayIdx])} · Day ${dayIdx + 1}/${board.days.length}`;

      // Bar chart — always tick (keeps sync when switching views mid-play)
      const top = Number(topSelect.value);
      const items = barFrameAt(t, barViewMode, top);
      const max = Math.max(1, ...items.map(r => r.value));
      if (!barRace) barRace = new BarRaceChart(barsChartEl);
      barRace.render(items, max);

      // Line chart — same timeline t, interpolated paths
      const racers = getLineRacers();
      if (racers.length) {
        if (!lineRace || !linesChartEl.querySelector('svg')) {
          linesChartEl.innerHTML = '';
          lineRace = new LineRaceChart(linesChartEl);
        }
        lineRace.render(racers, t);
      } else if (view === 'lines') {
        linesChartEl.innerHTML = '<div class="empty">请在 Bots 菜单中选择要查看的 bot</div>';
        lineRace = null;
      }
    }

    // ── Bot picker ──
    function updateBotPickerBtn() {
      const total = board.racers?.length || 0;
      const count = selectedCids.size;
      if (!count) botPickerBtn.textContent = 'Select bots';
      else if (count === total) botPickerBtn.textContent = `All (${count})`;
      else if (count === 1) {
        const racer = board.racers.find(r => selectedCids.has(r.cid));
        botPickerBtn.textContent = racer?.label || '1 bot';
      } else botPickerBtn.textContent = `${count} bots`;
    }

    function renderBotPickerList() {
      botPickerList.innerHTML = sortedRacers().map(r => `
        <label class="bot-picker-item" title="${r.label}">
          <input type="checkbox" value="${r.cid}" ${selectedCids.has(r.cid) ? 'checked' : ''} />
          <span>${r.label}</span>
        </label>
      `).join('');
    }

    function applyLineSelection(nextCids) {
      selectedCids = new Set(nextCids);
      renderBotPickerList();
      updateBotPickerBtn();
      if (view === 'lines') renderFrame(timeline.effectiveT());
    }

    function setLinePreset(preset) {
      const racers = sortedRacers();
      const next = preset === 'all' ? racers.map(r => r.cid) : racers.slice(0, Number(preset)).map(r => r.cid);
      applyLineSelection(next);
    }

    function toggleBotPicker(open) {
      const next = open ?? botPickerMenu.classList.contains('hidden');
      botPickerMenu.classList.toggle('hidden', !next);
      if (next) renderBotPickerList();
    }

    renderBotPickerList();
    updateBotPickerBtn();

    botPickerBtn.addEventListener('click', e => { e.stopPropagation(); toggleBotPicker(); });
    botPickerMenu.addEventListener('click', e => e.stopPropagation());
    botPickerMenu.querySelectorAll('[data-preset]').forEach(btn => {
      btn.addEventListener('click', () => setLinePreset(btn.dataset.preset));
    });
    botPickerList.addEventListener('change', e => {
      if (e.target.type !== 'checkbox') return;
      const next = new Set(selectedCids);
      if (e.target.checked) next.add(e.target.value);
      else next.delete(e.target.value);
      applyLineSelection([...next]);
    });
    document.addEventListener('click', () => toggleBotPicker(false));

    function setView(next) {
      timeline.stop();
      toggleBotPicker(false);
      view = next;
      barsBtn.classList.toggle('active', view === 'bars');
      linesBtn.classList.toggle('active', view === 'lines');
      barsPanel.classList.toggle('hidden', view !== 'bars');
      linesPanel.classList.toggle('hidden', view !== 'lines');
      topLabel.classList.toggle('hidden', view !== 'bars');
      viewModeLabel.classList.toggle('hidden', view !== 'bars');
      linesBotsLabel.classList.toggle('hidden', view !== 'lines');
      renderFrame(timeline.effectiveT(), { ready: timeline.t < 0 });
    }

    playBtn.addEventListener('click', () => {
      if (timeline.playing) timeline.stop();
      else timeline.start();
    });

    restartBtn.addEventListener('click', () => timeline.restart());

    topSelect.addEventListener('change', () => renderFrame(timeline.effectiveT()));
    viewModeSelect.addEventListener('change', () => {
      barViewMode = viewModeSelect.value;
      renderFrame(timeline.effectiveT());
    });

    barsBtn.addEventListener('click', () => setView('bars'));
    linesBtn.addEventListener('click', () => setView('lines'));

    // ── Init ──
    if (!board.days?.length) {
      barsChartEl.innerHTML = `<div class="empty">
        <p>暂无数据</p>
        <p style="margin-top:12px;font-size:13px;line-height:1.8">
          1. 编辑 <code>bots.txt</code> 添加 bot cid<br>
          2. 运行 <code>python3 track.py</code> 采集<br>
          3. 运行 <code>python3 build.py --open</code> 刷新页面
        </p>
      </div>`;
    } else {
      setView(view);
    }
  </script>
</body>
</html>
