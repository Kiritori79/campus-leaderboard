name: 每日数据采集与页面更新

on:
  schedule:
    # 每天 17:30 北京时间（09:30 UTC）
    - cron: "30 9 * * *"
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许推送回 repo
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成 config.py
        run: |
          cat > config.py << 'EOF'
          COOKIES = {
              "ZYBIPSCAS": "${{ secrets.COOKIE_ZYBIPSCAS }}",
              "ZYBIPSUN": "${{ secrets.COOKIE_ZYBIPSUN }}",
          }
          EOF

      - name: 采集数据
        run: python3 track.py

      - name: 生成页面
        run: python3 build.py

      - name: 提交更新
        if: github.event_name != 'push' || github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv index.html
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "🤖 自动更新数据 — $(date +'%Y-%m-%d %H:%M CST')"
            git push
          fi
