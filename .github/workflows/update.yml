name: 每日数据采集与页面更新

on:
  schedule:
    # 每天 17:30 北京时间（09:30 UTC）
    - cron: "30 9 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 推送数据回仓库
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: 生成 config.py
        run: |
          cat > config.py << 'EOF'
          COOKIES = {
              "ZYBIPSCAS": "${{ secrets.COOKIE_ZYBIPSCAS }}",
              "ZYBIPSUN": "${{ secrets.COOKIE_ZYBIPSUN }}",
          }
          EOF

      - name: 采集数据
        run: python3 track.py

      - name: 生成页面
        run: python3 build.py

      - name: 提交数据到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv index.html
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "🤖 自动更新数据 — $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: 准备部署目录
        run: |
          mkdir -p _site
          cp index.html _site/

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
